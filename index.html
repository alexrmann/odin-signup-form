<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odin Sign-Up Form</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container container--body">
      <header class="header header--page">
        <div class="banner">
          <div class="logo logo--page">
            <img
              class="logo-image"
              src="odin-lined.png"
              alt="The Odin Project logo"
            />
          </div>
          <div class="lettermark">ODIN</div>
        </div>

        <div class="image-credit">
          Background image by
          <a href="https://unsplash.com/@haliewestphoto">Halie West</a> on
          <a href="https://unsplash.com">Unsplash</a>
        </div>
      </header>

      <main class="main flow">
        <header class="header header--main flow">
          <div class="container container--main flow">
            <p>
              This is not a real online-service! You know you need something
              like this in your life to help you realize your deepest dreams.
              Sign up
              <em>now</em> to get started.
            </p>
            <p>You <em>know</em> you want to.</p>
          </div>
        </header>

        <form id="myform" class="form flow" action="#" method="post">
          <div class="container container--main flow">
            <header>Let's do this!</header>
            <div class="container--form flow">
              <input type="text" />
              <input type="text" />
              <input type="text" />
            </div>
          </div>
        </form>

        <div class="container container--main">
          <button type="submit" form="myform" class="button button--submit">
            <div class="button-content">Submit</div>
          </button>
        </div>

        <footer>
          <div class="container container--main flow">
            Already have an account? <a href="#">Log in</a>
          </div>
        </footer>
      </main>
    </div>
  </body>
</html>
