<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odin Sign-Up Form</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container container--body">
      <header class="header header--page">
        <div class="banner">
          <div class="logo logo--page">
            <img
              class="logo-image"
              src="odin-lined.png"
              alt="The Odin Project logo"
            />
          </div>
          <div class="lettermark">ODIN</div>
        </div>

        <div class="image-credit">
          Background image by
          <a href="https://unsplash.com/@haliewestphoto">Halie West</a> on
          <a href="https://unsplash.com">Unsplash</a>
        </div>
      </header>

      <main class="main flow">
        <div class="main__container">
          <header class="header header--main flow">
            <div class="container container--main flow">
              <p>This is not a real online-service!</p>
              <p>
                You know you need something like this in your life to help you
                realize your deepest dreams. Sign up <em>now</em> to get started.
              </p>
              <p>You <em>know</em> you want to.</p>
            </div>
          </header>
          <form id="sign-up" class="form flow" action="#" method="post">
            <div class="container container--main form__container flow">
              <header class="form__heading">Let's do this!</header>
              <div class="form__container--form-inner">
                <div class="form__group">
                  <!-- The browser ensures an input value adheres with the constraints defined by the type, min, max, step, minlength, maxlength, pattern, and required attributes. -->
                  <label class="form__label" for="">First Name</label>
                  <input class="form__input" type="text" name="firstname" />
                </div>
                <div class="form__group">
                  <label class="form__label" for="">Last Name</label>
                  <input class="form__input" type="text" name="lastname" />
                </div>
                <div class="form__group">
                  <label class="form__label" for="">Email*</label>
                  <input class="form__input" type="email" name="email" required />
                </div>
                <div class="form__group">
                  <label class="form__label" for="">Phone Number</label>
                  <input class="form__input" type="tel" name="phone-number" />
                </div>
                <div class="form__group">
                  <label class="form__label" for="">Password*</label>
                  <input
                    class="form__input"
                    type="password"
                    name="password"
                    minlength="8"
                    maxlength="32"
                    pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,32}$"
                    required
                  />
                </div>
                <div class="form__group">
                  <label class="form__label" for="">Confirm Password*</label>
                  <input
                    class="form__input"
                    type="password"
                    name="password"
                    minlength="8"
                    maxlength="32"
                    pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$#\^\(\)!%*?&])[A-Za-z\d@$#\^\(\)!%*?&]{8,32}$"
                    required
                  />
                </div>
              </div>
            </div>
          </form>
          <div class="container container--main">
            <button type="submit" form="sign-up" class="button button--submit">
              <div class="button-content">Create Account</div>
            </button>
          </div>
          <footer class="footer footer--main">
            <div class="container container--main flow">
              Already have an account?
              <a class="link link--login" href="#">Log in</a>
            </div>
          </footer>
        </div>
      </main>
    </div>
  </body>
</html>
